services:
  postgres:
    image: postgres:16-alpine
    container_name: dagster-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dagster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dagster_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dagster}
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dagster}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dagster-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dagster-webserver
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    ports:
      - "3000:3000"
    volumes:
      - ${PROJECT_PATH}:/opt/dagster/project
    environment:
      DAGSTER_HOME: /opt/dagster
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USER: ${POSTGRES_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${POSTGRES_PASSWORD:-dagster_pass}
      DAGSTER_PG_DB: ${POSTGRES_DB:-dagster}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dagster-daemon
    command: ["dagster-daemon", "run"]
    volumes:
      - ${PROJECT_PATH}:/opt/dagster/project
    environment:
      DAGSTER_HOME: /opt/dagster
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USER: ${POSTGRES_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${POSTGRES_PASSWORD:-dagster_pass}
      DAGSTER_PG_DB: ${POSTGRES_DB:-dagster}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dagster-postgres-data:
